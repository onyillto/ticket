<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red base -->
  <rect width="512" height="512" fill="#CC2027"/>

  <!-- Blue blob top-left (matches FIFA 2026 icon style) -->
  <path d="M0,0 L500,0 C430,70 310,175 145,320 L0,320 Z" fill="#1B3C8E"/>

  <!-- Black bottom bar -->
  <rect y="385" width="512" height="127" fill="#0D0D0D"/>

  <!-- "26" — very large white text -->
  <text
    x="256" y="315"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="295"
    fill="white"
    text-anchor="middle"
    dominant-baseline="alphabetic"
    letter-spacing="-10"
  >26</text>

  <!-- "FIFA" small text above black bar -->
  <text
    x="256" y="375"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="46"
    fill="white"
    text-anchor="middle"
    letter-spacing="12"
  >FIFA</text>

  <!-- "TICKETS" in black bar -->
  <text
    x="256" y="465"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="74"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
  >TICKETS</text>
</svg>
